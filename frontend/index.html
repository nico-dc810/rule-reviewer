<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模糊需求审查器</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 252, 247, 0.88);
      --ink: #1e2933;
      --muted: #5f6b76;
      --line: rgba(30, 41, 51, 0.14);
      --accent: #a14c28;
      --accent-2: #21455f;
      --ok: #2d6a4f;
      --bad: #b42318;
      --soft: #ead5c8;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(161, 76, 40, 0.18), transparent 24%),
        radial-gradient(circle at bottom right, rgba(33, 69, 95, 0.16), transparent 22%),
        var(--bg);
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
    }

    .hero {
      padding: 26px;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 0;
      max-width: 800px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.02rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 18px;
    }

    .panel {
      padding: 20px;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.94rem;
    }

    textarea, select, input, button {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(30, 41, 51, 0.18);
      padding: 14px 16px;
      font: inherit;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    .mini {
      min-height: 96px;
    }

    button {
      border: 0;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
    }

    .hint {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .chipbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--soft);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.85rem;
    }

    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .status strong {
      font-size: 2.5rem;
      letter-spacing: -0.05em;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.62);
      margin-top: 12px;
    }

    .rule-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }

    .muted { color: var(--muted); }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(30, 41, 51, 0.05);
      border-radius: 14px;
      padding: 12px;
      font-size: 0.9rem;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 18px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .layout, .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>把模糊要求变成可执行审查标准</h1>
      <p>左侧输入需求和待审查内容，右侧直接看到规则、分项评分和建议。你也可以切换到大模型模式，让系统通过 API 生成更细的 rubric 和审查报告。</p>
    </section>

    <section class="layout">
      <section class="panel stack">
        <div class="row">
          <div>
            <label for="mode">审查模式</label>
            <select id="mode">
              <option value="local">本地规则引擎</option>
              <option value="llm">大模型 API</option>
            </select>
          </div>
          <div>
            <label for="artifactType">内容类型</label>
            <select id="artifactType">
              <option value="auto">自动识别</option>
              <option value="article">文章</option>
              <option value="code">代码</option>
              <option value="general">通用文本</option>
            </select>
          </div>
        </div>

        <div>
          <label for="requirement">模糊需求</label>
          <textarea id="requirement">这篇方案要更专业、结构更清楚、覆盖完整，而且要给出可执行的建议。</textarea>
        </div>

        <div>
          <label for="artifact">待审查内容</label>
          <textarea id="artifact">本方案围绕用户增长展开。首先分析目标人群，其次给出渠道策略和执行节奏，最后总结关键指标。建议先从低成本渠道验证，再根据转化率调整资源投入。</textarea>
        </div>

        <div class="row">
          <div>
            <label for="model">模型名</label>
            <input id="model" placeholder="可留空，使用后端默认模型">
          </div>
          <div>
            <label for="temperature">Temperature</label>
            <input id="temperature" type="number" min="0" max="1" step="0.1" value="0.2">
          </div>
        </div>

        <button id="submitBtn">生成规则并审查</button>
        <div class="hint" id="llmStatus">正在检查大模型配置...</div>
      </section>

      <section class="panel" id="result">
        <div class="status">
          <div>
            <div class="muted">等待执行</div>
            <strong>--</strong>
          </div>
          <div class="chip">尚未审查</div>
        </div>
        <p class="muted">系统会在这里展示结构化规则、打分结果和改进建议。</p>
      </section>
    </section>
  </main>

  <script>
    const resultEl = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");
    const llmStatusEl = document.getElementById("llmStatus");

    function scoreClass(score) {
      if (score >= 75) return "ok";
      if (score < 60) return "bad";
      return "";
    }

    function renderReview(data, mode) {
      const cards = data.results.map((item) => `
        <div class="card">
          <div class="rule-head">
            <strong>${item.rule_name}</strong>
            <span class="${item.passed ? "ok" : "bad"}">${item.score}</span>
          </div>
          <div class="muted">${item.reason}</div>
          <div class="chipbar">
            ${(item.evidence || []).length
              ? item.evidence.map((value) => `<span class="chip">${value}</span>`).join("")
              : "<span class='chip'>未发现明显证据</span>"}
          </div>
        </div>
      `).join("");

      resultEl.innerHTML = `
        <div class="status">
          <div>
            <div class="muted">综合评分 / ${mode === "llm" ? "大模型审查" : "本地审查"} / ${data.inferred_artifact_type}</div>
            <strong class="${scoreClass(data.overall_score)}">${data.overall_score}</strong>
          </div>
          <div class="chip ${data.passed ? "ok" : "bad"}">${data.passed ? "基本达标" : "需要加强"}</div>
        </div>
        <p>${data.summary}</p>
        <div class="card">
          <strong>归一化需求</strong>
          <p class="muted">${data.normalized_requirement}</p>
        </div>
        <div class="card">
          <strong>修改建议</strong>
          <ul>${data.suggestions.map((item) => `<li>${item}</li>`).join("")}</ul>
        </div>
        <div class="card">
          <strong>生成出的规则</strong>
          <pre>${JSON.stringify(data.rules, null, 2)}</pre>
        </div>
        ${cards}
      `;
    }

    async function loadLLMStatus() {
      try {
        const response = await fetch("/api/llm/status");
        const data = await response.json();
        llmStatusEl.textContent = data.configured
          ? `大模型已配置：${data.model} @ ${data.base_url}`
          : "尚未配置 OPENAI_API_KEY，当前只能使用本地规则引擎。";
      } catch (error) {
        llmStatusEl.textContent = `无法获取大模型状态：${error}`;
      }
    }

    async function submitReview() {
      const mode = document.getElementById("mode").value;
      const payload = {
        requirement: document.getElementById("requirement").value,
        artifact: document.getElementById("artifact").value,
        artifact_type: document.getElementById("artifactType").value
      };

      if (mode === "llm") {
        payload.model = document.getElementById("model").value || null;
        payload.temperature = Number(document.getElementById("temperature").value || "0.2");
      }

      submitBtn.disabled = true;
      submitBtn.textContent = mode === "llm" ? "调用大模型中..." : "审查中...";

      try {
        const endpoint = mode === "llm" ? "/api/review/llm" : "/api/review";
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || "请求失败");
        }
        renderReview(data, mode);
      } catch (error) {
        resultEl.innerHTML = `
          <div class="card">
            <strong>请求失败</strong>
            <p class="muted">${error}</p>
          </div>
        `;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "生成规则并审查";
      }
    }

    submitBtn.addEventListener("click", submitReview);
    loadLLMStatus();
  </script>
</body>
</html>
